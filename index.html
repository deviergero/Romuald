<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singularity V48 - Radar Bot</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
        }
        h1 { color: #38bdf8; margin-top: 0; }
        .credits {
            font-size: 1.2em;
            background: #334155;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #475569; cursor: not-allowed; }
        
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border: 2px solid #22c55e;
            border-radius: 8px;
            background: #064e3b;
            display: none;
        }
        .target { font-size: 2em; color: #4ade80; font-weight: bold; }
        
        .vip-section {
            margin-top: 20px;
            display: none;
        }
        input[type="text"] {
            width: 90%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #64748b;
            background: #0f172a;
            color: white;
        }
        .loading { display: none; color: #fbbf24; font-style: italic; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌌 SINGULARITY V48</h1>
    <div class="credits" id="creditDisplay">Crédits gratuits : 5/5</div>
    
    <button id="actionBtn" onclick="generatePrediction()">🎯 DEMANDER UNE PRÉDICTION</button>
    <div id="loadingText" class="loading">⏳ Analyse des algorithmes en cours...</div>
    
    <div id="resultBox" class="result-box">
        <p>✅ SIGNAL CONFIRMÉ</p>
        <div class="target" id="targetOdds">2.00x</div>
        <p>Heure d'entrée prévue : <strong id="targetTime">--:--</strong></p>
    </div>

    <div id="vipSection" class="vip-section">
        <p style="color: #ef4444;">🚫 Crédits épuisés.</p>
        <input type="text" id="vipCode" placeholder="Entrez votre Clé VIP">
        <button onclick="checkVip()" style="background: #eab308; color: black;">🔓 Activer VIP</button>
    </div>
</div>

<script>
    // Liste de vos mots de passe VIP
    const VIP_CODES = ["ROME225", "VIP500K", "BOSS2026"];
    
    // Initialisation du joueur avec la mémoire du navigateur (localStorage)
    let userCredits = localStorage.getItem('credits');
    let isVip = localStorage.getItem('isVip') === 'true';

    if (userCredits === null) {
        userCredits = 5;
        localStorage.setItem('credits', 5);
    } else {
        userCredits = parseInt(userCredits);
    }

    function updateUI() {
        if (isVip) {
            document.getElementById('creditDisplay').innerText = "Accès VIP : Illimité 💎";
            document.getElementById('creditDisplay').style.color = "#fbbf24";
            document.getElementById('vipSection').style.display = 'none';
            document.getElementById('actionBtn').disabled = false;
        } else {
            document.getElementById('creditDisplay').innerText = `Crédits gratuits : ${userCredits}/5`;
            if (userCredits <= 0) {
                document.getElementById('actionBtn').disabled = true;
                document.getElementById('vipSection').style.display = 'block';
            }
        }
    }

    function generatePrediction() {
        if (!isVip && userCredits <= 0) return;

        // Cacher l'ancien résultat et montrer le chargement
        document.getElementById('resultBox').style.display = 'none';
        document.getElementById('loadingText').style.display = 'block';
        document.getElementById('actionBtn').disabled = true;

        // Déduire le crédit si non VIP
        if (!isVip) {
            userCredits--;
            localStorage.setItem('credits', userCredits);
        }

        updateUI();

        // Attendre 2 secondes (effet d'analyse)
        setTimeout(() => {
            document.getElementById('loadingText').style.display = 'none';
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('actionBtn').disabled = userCredits <= 0 && !isVip;

            // Logique V48
            let rand = Math.random();
            let target = 0;
            if (rand < 0.70) target = (Math.random() * (1.99 - 1.50) + 1.50).toFixed(2);
            else if (rand < 0.90) target = (Math.random() * (2.49 - 2.00) + 2.00).toFixed(2);
            else target = (Math.random() * (3.50 - 2.50) + 2.50).toFixed(2);

            let now = new Date();
            now.setMinutes(now.getMinutes() + Math.floor(Math.random() * 4) + 2);
            let timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

            document.getElementById('targetOdds').innerText = target + "x";
            document.getElementById('targetTime').innerText = timeStr;
        }, 2000);
    }

    function checkVip() {
        let inputCode = document.getElementById('vipCode').value.trim().toUpperCase();
        if (VIP_CODES.includes(inputCode)) {
            isVip = true;
            localStorage.setItem('isVip', 'true');
            alert("✅ Code VIP accepté ! Accès illimité débloqué.");
            updateUI();
        } else {
            alert("❌ Code invalide.");
        }
    }

    // Lancer l'affichage au démarrage
    updateUI();
</script>

</body>
</html>
